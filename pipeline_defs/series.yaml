name: series
version: "1.0"
description: >
  Episodic series pipeline (learning_series / tv_series / weekly_series). Plans a
  multi-episode arc from a topic or premise, then produces each episode with a
  consistent style bible, recurring characters/hosts, and continuity across
  episodes. Ported from content-factory's LearningSeriesPipeline / TVSeriesPipeline
  so it runs under EP orchestration with provider scoring, budget caps, and the
  slideshow-risk gate. Episodic content is slideshow-prone (talking-head + b-roll),
  so scene_plan and compose are gated on shot intent and motion purpose per
  episode via OpenMontage's lib/slideshow_risk.py.
category: generated
stability: beta
default_checkpoint_policy: guided

orchestration:
  mode: executive-producer
  skill: pipelines/series/executive-producer
  budget_default_usd: 3.00
  max_revisions_per_stage: 3
  max_send_backs: 2
  max_wall_time_minutes: 30

metadata:
  compose_adapter: "content-factory: pipelines/series/learning.py :: LearningSeriesPipeline | pipelines/series/tv.py :: TVSeriesPipeline"
  governance_seam: "content-factory: utils/orchestration/scene_gate.py :: run_scene_gate"
  slideshow_gate:
    renderer_family: cloud-video
    render_runtime: cloud
    applied_at: [scene_plan, compose]
    enforce_env: LEARNING_SERIES_ENFORCE_SLIDESHOW
  episodic: true

extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false

required_skills:
  - pipelines/series/executive-producer
  - pipelines/series/idea-director
  - pipelines/series/arc-director
  - pipelines/series/script-director
  - pipelines/series/scene-director
  - pipelines/series/asset-director
  - pipelines/series/edit-director
  - pipelines/series/compose-director
  - pipelines/series/publish-director
  - meta/reviewer
  - meta/checkpoint-protocol

compatible_playbooks:
  recommended:
    - clean-professional
    - flat-motion-graphics
  also_works: []
  custom_allowed: true

stages:
  - name: idea
    skill: pipelines/series/idea-director
    produces:
      - brief
      - decision_log
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Series premise, audience, episode count, and per-episode duration set
      - Format identified (learning curriculum / TV drama / weekly recap / podcast dialogue)
      - Recurring hosts/characters and tone defined
      - Podcast format declares host/guest personas and dialogue dynamic
    success_criteria:
      - Schema-valid brief artifact
      - Brief states episode count, arc theme, and CTA/learning objective

  - name: arc
    skill: pipelines/series/arc-director
    required_artifacts_in:
      - brief
    produces:
      - scene_plan
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Episode-by-episode arc with continuity and escalating value
      - Each episode has a distinct objective; no redundant episodes
      - Style bible (palette, typography, host treatment) defined once and reused
      - Learning format applies pedagogy pacing (assessment/recap episodes at declared ratio)
    success_criteria:
      - Schema-valid scene_plan artifact (series arc)
      - One planned episode entry per declared episode

  - name: script
    skill: pipelines/series/script-director
    required_artifacts_in:
      - scene_plan
    produces:
      - script
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Per-episode hook, body beats, and recap/teaser of adjacent episodes
      - Sound-off legibility; continuity callbacks land
      - Per-episode CTA / learning checkpoint present
    success_criteria:
      - Schema-valid script artifact
      - Ordered beats for every episode in the arc

  - name: scene_plan
    skill: pipelines/series/scene-director
    required_artifacts_in:
      - script
    optional_artifacts_in:
      - brief
    produces:
      - scene_plan
    required_tools: []
    optional_tools:
      - frame_sampler
    tools_available:
      - frame_sampler
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Each episode scene states an information_role and a shot_intent (anti-slideshow)
      - Talking-head segments are intercut with motivated b-roll, not static holds
      - Shot sizes and framing vary within and across episodes
    success_criteria:
      - Schema-valid scene_plan artifact
      - Slideshow-risk verdict is at least 'acceptable' (no 'fail') per episode

  - name: assets
    skill: pipelines/series/asset-director
    required_artifacts_in:
      - scene_plan
    optional_artifacts_in:
      - script
    produces:
      - asset_manifest
    required_tools:
      - tts_selector
    optional_tools:
      - image_selector
      - video_selector
      - music_gen
      - subtitle_gen
    tools_available:
      - tts_selector
      - image_selector
      - video_selector
      - music_gen
      - subtitle_gen
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Narration (tts_selector) consistent across episodes; selectors route via lib/scoring.py
      - B-roll / stills resolved per scene with style-bible consistency
      - Per-episode captions and music beds prepared
    success_criteria:
      - Schema-valid asset_manifest artifact
      - Assets resolved for every planned scene across all episodes
      - Each generated asset records selected_provider + provider_score (scoring audit trail)

  - name: edit
    skill: pipelines/series/edit-director
    required_artifacts_in:
      - scene_plan
      - asset_manifest
    produces:
      - edit_decisions
    tools_available: []
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - "Each episode: intro -> body -> recap/teaser, consistent across the series"
      - Cuts motivated and on-beat; episode durations within target
      - Recurring lower-thirds / branding applied uniformly
    success_criteria:
      - Schema-valid edit_decisions artifact
      - Ordered timeline per episode

  - name: compose
    skill: pipelines/series/compose-director
    required_artifacts_in:
      - edit_decisions
      - asset_manifest
    optional_artifacts_in:
      - scene_plan
    produces:
      - render_report
      - final_review
    required_tools:
      - video_compose
    optional_tools:
      - hyperframes_compose
      - audio_mixer
    tools_available:
      - video_compose
      - hyperframes_compose
      - audio_mixer
    checkpoint_required: true
    human_approval_default: false
    review_focus:
      - Each episode renders at target resolution/fps with consistent style
      - Slideshow-risk re-check passes per episode before the render is accepted
      - Loudness and caption sync within spec across episodes
      - HyperFrames finishing pass applied where planned (chapter markers, quiz cards, end cards)
      - "Stickiness: episode hook lands in first 30s; re-engagement beats planted; captions inside safe zones"
    success_criteria:
      - Schema-valid render_report artifact
      - One output file per episode, each passing ffprobe validation
      - render_report records the per-episode slideshow-risk verdict (governance audit trail)

  - name: publish
    skill: pipelines/series/publish-director
    required_artifacts_in:
      - render_report
      - final_review
    optional_artifacts_in:
      - brief
    produces:
      - publish_log
    tools_available: []
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Per-episode titles/descriptions and series playlist metadata
      - Thumbnails consistent with the series style bible
      - Release cadence (weekly/seasonal) recorded
      - Localization/dubbing plan recorded when target locales are declared (hand off to localization-dub)
    success_criteria:
      - Schema-valid publish_log artifact
      - Export directory contains every episode with series + per-episode metadata
